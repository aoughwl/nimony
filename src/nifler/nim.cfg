
--path: "$nim"
# Overlay a patched copy of the host Nim `compiler/` dir (generated by hastur's
# ensureNiflerParserOverlay) so `type C = concept of D` parses on host Nims
# whose `parser.nim` predates that devel fix. Listed after `$nim` so it wins the
# path search; absent (fresh checkout / non-hastur build) it is simply ignored.
--path: "$config/../../.nim_overlay"
--define: nimcore
# Btw this relies on a Nim bug where it interprets the --outdir relative to the current directory
# instead of the directory of this nim.cfg file.
--outdir: "bin"
